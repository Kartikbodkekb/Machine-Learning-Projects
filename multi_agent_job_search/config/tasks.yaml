research_task:
  description: >
    Search the web for 2-3 high-quality, open job listings for the role: '{job_title}' in '{location}'.
    Extract the company name, full job description, explicit requirements, and application URLs.
  expected_output: >
    A structured Markdown document listing the discovered jobs, complete with full descriptions and segmented keywords.
  agent: job_researcher

tailor_resume_task:
  description: >
    Take the user's baseline resume:
    ---
    {baseline_resume}
    ---
    Compare it against the highest-matching job description found in the research_task. 
    Rewrite the resume to strategically highlight experiences that match the job's key requirements. Ensure ATS compliance.
  expected_output: >
    A fully updated resume written in clean Markdown, ready to export.
  agent: resume_specialist

draft_outreach_task:
  description: >
    Using the tailored resume and the target job description from previous tasks, draft:
    1. A tailored Cover Letter addressed to the company/hiring manager.
    2. A short (under 300 characters) LinkedIn connection note to send to a potential team leader.
  expected_output: >
    A clean Markdown document containing both the cover letter and the LinkedIn outreach template.
  agent: outreach_writer